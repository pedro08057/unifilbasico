<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="form.css">
    <script src="viacep.js" defer></script>
    <title>Formulário</title>
</head>
<body>
    <h1>Criar Conta</h1>

    <form id="formulario-cadastra-se" class="formulario" method = "POST">

        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

        <label for="data-nascimento">Data Nascimento</label>
        <input type="date" id="data-nascimento" name="data-nascimento" required>

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seuemail@email.com" required>

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" minlength="8" placeholder="Senha" required>

        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000 " required>

        <label for="cep">CEP</label>
        <input type="text" id="cep" name="cep" placeholder="00000-000" required>




        <label for="logradouro">Rua</label>
        <input type="text" id="logradouro" name="logradouro" required>

        <label for="número">Número</label>
        <input type="text" id="número" name="número" required>

        <label for="bairro">Bairro</label>
        <input type="text" id="bairro" name="bairro" required>

        <label for="localidade">Cidade</label>
        <input type="text" id="localidade" name="localidade" required>

        
        
        <label for="uf">UF</label>
        <input type="text" id="uf" name="uf">

        <input type="checkbox" id="termos" name="termos" required>
        <label for="termos">Eu li e aceito os Termos de Uso e a Política de Privacidade</label>

        <a href="#"><button type="submit" class="btn">Cadastrar-se</button></a>
    </form>
</body>
</html>
